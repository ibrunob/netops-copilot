default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
      - id: detect-private-key

  - repo: local
    hooks:
      - id: python-ruff-format
        name: python ruff format check
        entry: uv run --frozen ruff format --check services/api services/worker
        language: system
        files: ^services/(api|worker)/.*\.py$
        pass_filenames: false
      - id: python-ruff-lint
        name: python ruff lint
        entry: uv run --frozen ruff check services/api services/worker
        language: system
        files: ^services/(api|worker)/.*\.py$
        pass_filenames: false
      - id: web-check
        name: web lint, types, and source tests
        entry: npm --prefix apps/web run check
        language: system
        files: ^apps/web/
        pass_filenames: false
