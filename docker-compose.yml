name: netops-copilot

x-local-restart: &local-restart
  restart: unless-stopped

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: netops-copilot-api:local
    profiles: ["core"]
    <<: *local-restart
    environment:
      NETOPS_ENVIRONMENT: ${NETOPS_ENVIRONMENT:-local}
      NETOPS_SERVICE_NAME: ${NETOPS_SERVICE_NAME:-netops-api}
      NETOPS_API_VERSION: ${NETOPS_API_VERSION:-0.1.0}
      NETOPS_HOST: 0.0.0.0
      NETOPS_PORT: "8000"
      NETOPS_RELOAD: "false"
      NETOPS_DOCS_ENABLED: ${NETOPS_DOCS_ENABLED:-true}
      NETOPS_LOG_LEVEL: ${NETOPS_LOG_LEVEL:-INFO}
      NETOPS_DATABASE_URL: "postgresql+psycopg://netops_app:${POSTGRES_APP_PASSWORD:?Set POSTGRES_APP_PASSWORD in the root .env file}@postgres:5432/${POSTGRES_DB:-netops}"
      NETOPS_DEPENDENCIES__POSTGRES__HOST: postgres
      NETOPS_DEPENDENCIES__POSTGRES__PORT: "5432"
      NETOPS_DEPENDENCIES__REDIS__HOST: redis
      NETOPS_DEPENDENCIES__REDIS__PORT: "6379"
      NETOPS_DEPENDENCIES__MINIO__HOST: minio
      NETOPS_DEPENDENCIES__MINIO__PORT: "9000"
      NETOPS_DEPENDENCIES__TEMPORAL__HOST: temporal
      NETOPS_DEPENDENCIES__TEMPORAL__PORT: "7233"
      NETOPS_DEPENDENCIES__KEYCLOAK__HOST: keycloak
      NETOPS_DEPENDENCIES__KEYCLOAK__PORT: "8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "127.0.0.1:${NETOPS_PORT:-8000}:8000"

  # The API runs only with the unprivileged application role. Alembic executes
  # first using the PostgreSQL bootstrap owner so the runtime role and RLS
  # policy exist on a clean volume before any request can reach the API.
  migrate:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: netops-copilot-api:local
    profiles: ["core"]
    restart: "no"
    entrypoint: ["alembic"]
    command: ["-c", "/app/alembic.ini", "upgrade", "head"]
    environment:
      NETOPS_DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-netops}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}@postgres:5432/${POSTGRES_DB:-netops}"
      NETOPS_APPLICATION_DB_PASSWORD: "${POSTGRES_APP_PASSWORD:?Set POSTGRES_APP_PASSWORD in the root .env file}"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: netops-copilot-web:local
    profiles: ["core"]
    <<: *local-restart
    environment:
      # Server-only; never promote this to NEXT_PUBLIC_* because browsers must
      # not receive internal Compose DNS or any API credential configuration.
      NETOPS_API_BASE_URL: http://api:8000
    depends_on:
      api:
        # The API's current health probe is application-process liveness. The
        # API itself is gated on actual infrastructure health below.
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"

  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    profiles: ["core"]
    <<: *local-restart
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netops}
      POSTGRES_USER: ${POSTGRES_USER:-netops}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}"
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    shm_size: 256mb

  # A separate PostgreSQL cluster keeps migration and integration tests from
  # sharing data, connections, or the named volume used by a developer's core
  # stack. It is intentionally an explicit profile rather than a dependency of
  # `make test`: unit tests must not start infrastructure implicitly.
  postgres-test:
    image: pgvector/pgvector:0.8.0-pg16
    profiles: ["test"]
    restart: "no"
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB:-netops_test}
      POSTGRES_USER: ${POSTGRES_TEST_USER:-netops_test}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}"
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    ports:
      - "127.0.0.1:${POSTGRES_TEST_PORT:-5433}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./infra/postgres/test-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    shm_size: 256mb

  redis:
    image: redis:7.4.2-alpine
    profiles: ["core"]
    <<: *local-restart
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: ["core"]
    <<: *local-restart
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in the root .env file}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in the root .env file}"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    profiles: ["core"]
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in the root .env file}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in the root .env file}"
      MINIO_BUCKET: ${MINIO_BUCKET:-netops-artifacts}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$MINIO_BUCKET"

  temporal:
    image: temporalio/auto-setup:1.25.2
    profiles: ["core"]
    <<: *local-restart
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${POSTGRES_USER:-netops}
      POSTGRES_PWD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}"
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "127.0.0.1:${TEMPORAL_GRPC_PORT:-7233}:7233"
    healthcheck:
      test: ["CMD-SHELL", "tctl --address temporal:7233 cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.26.2
    profiles: ["core"]
    <<: *local-restart
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "127.0.0.1:${TEMPORAL_UI_PORT:-8233}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.1
    profiles: ["core"]
    <<: *local-restart
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:?Set KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME in the root .env file}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:?Set KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD in the root .env file}"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-netops}
      KC_DB_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: 8080
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      # The Keycloak image intentionally does not include curl. Its documented
      # container check uses bash's TCP socket support instead.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.7
    profiles: ["events"]
    <<: *local-restart
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=OUTSIDE://localhost:8082
      - --schema-registry-addr=0.0.0.0:8081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "127.0.0.1:${REDPANDA_KAFKA_PORT:-19092}:19092"
      - "127.0.0.1:${REDPANDA_ADMIN_PORT:-9644}:9644"
      - "127.0.0.1:${REDPANDA_SCHEMA_REGISTRY_PORT:-8081}:8081"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --api-urls=localhost:9644 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  # Observability remains opt-in locally. The collector, metrics store, trace
  # store, and Grafana are wired together here; application instrumentation is
  # introduced with the M1 API/worker observability slice.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    profiles: ["observability"]
    <<: *local-restart
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:${OTEL_GRPC_PORT:-4317}:4317"
      - "127.0.0.1:${OTEL_HTTP_PORT:-4318}:4318"
      - "127.0.0.1:${OTEL_METRICS_PORT:-8889}:8889"
    depends_on:
      tempo:
        condition: service_started

  prometheus:
    image: prom/prometheus:v3.2.1
    profiles: ["observability"]
    <<: *local-restart
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  tempo:
    image: grafana/tempo:2.7.1
    profiles: ["observability"]
    <<: *local-restart
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:${TEMPO_HTTP_PORT:-3200}:3200"

  grafana:
    image: grafana/grafana:11.5.2
    profiles: ["observability"]
    <<: *local-restart
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "false"
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  postgres_data:
    name: "${COMPOSE_PROJECT_NAME:-netops-copilot}-postgres-data"
  postgres_test_data:
    name: "${COMPOSE_PROJECT_NAME:-netops-copilot}-postgres-test-data"
  redis_data:
    name: "${COMPOSE_PROJECT_NAME:-netops-copilot}-redis-data"
  minio_data:
    name: "${COMPOSE_PROJECT_NAME:-netops-copilot}-minio-data"
  redpanda_data:
    name: "${COMPOSE_PROJECT_NAME:-netops-copilot}-redpanda-data"
  prometheus_data:
    name: "${COMPOSE_PROJECT_NAME:-netops-copilot}-prometheus-data"
  tempo_data:
    name: "${COMPOSE_PROJECT_NAME:-netops-copilot}-tempo-data"
  grafana_data:
    name: "${COMPOSE_PROJECT_NAME:-netops-copilot}-grafana-data"
