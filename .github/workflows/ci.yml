name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-locks:
    name: Verify dependency locks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Require committed, reproducible locks
        shell: bash
        run: |
          missing=0
          for file in uv.lock apps/web/package-lock.json; do
            if [[ ! -f "$file" ]]; then
              echo "::error file=$file::Missing required lock file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Generate uv.lock with Python 3.12 using 'uv lock' and commit it."
            echo "Generate apps/web/package-lock.json from its pinned package manifest and commit it."
            echo "See services/api/DEPENDENCY_RESOLUTION.md and CONTRIBUTING.md."
            exit 1
          fi
          uv lock --check
          npm --prefix apps/web ci

  compose-config:
    name: Validate Compose configuration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Render all Compose profiles
        run: make compose-config

  api-quality:
    name: API lint, types, and tests
    needs: dependency-locks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - name: Synchronize locked Python environment
        run: uv sync --frozen --extra dev
      - name: Lint
        run: uv run --frozen ruff check services/api
      - name: Type check
        run: uv run --frozen mypy
      - name: Test
        run: uv run --frozen pytest

  tenant-rls:
    name: PostgreSQL tenant RLS gate
    needs: dependency-locks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - name: Synchronize locked Python environment
        run: uv sync --frozen --extra dev
      - name: Run adversarial tenant isolation checks
        run: make test-rls
      - name: Collect PostgreSQL logs on failure
        if: failure()
        run: docker compose --env-file .env --profile test logs --no-color postgres-test
      - name: Remove isolated PostgreSQL test resources
        if: always()
        run: docker compose --env-file .env --profile test down --volumes --remove-orphans

  postgres-restore-drill:
    name: PostgreSQL backup and restore drill
    needs: dependency-locks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - name: Synchronize locked Python environment
        run: uv sync --frozen --extra dev
      - name: Restore a real isolated application archive
        run: make db-restore-drill
      - name: Collect PostgreSQL logs on failure
        if: failure()
        run: docker compose --env-file .env --profile test logs --no-color postgres-test
      - name: Remove isolated PostgreSQL test resources
        if: always()
        run: docker compose --env-file .env --profile test down --volumes --remove-orphans

  web-quality:
    name: Web lint, types, and tests
    needs: dependency-locks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install locked web dependencies
        run: npm --prefix apps/web ci
      - name: Run locked web checks
        run: npm --prefix apps/web run check
      - name: Build production Next.js application
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm --prefix apps/web run build

  pre-commit:
    name: Pre-commit policy gate
    needs: dependency-locks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Synchronize locked developer dependencies
        run: |
          uv sync --frozen --extra dev
          npm --prefix apps/web ci
      - name: Reject dotenv files and likely literal credentials
        run: make secret-hygiene
      - name: Run repository pre-commit configuration
        run: uv run --frozen pre-commit run --show-diff-on-failure --color=always --all-files

  image-sbom:
    name: Build ${{ matrix.component }} image and generate SBOM
    needs: [api-quality, tenant-rls, postgres-restore-drill, web-quality, pre-commit]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            dockerfile: services/api/Dockerfile
            image: netops-copilot-api
          - component: web
            dockerfile: apps/web/Dockerfile
            image: netops-copilot-web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build local ${{ matrix.component }} image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.image }}:ci-${{ github.sha }}
          load: true
          push: false
          provenance: false
          sbom: false
      - name: Verify the local image export
        run: docker image inspect ${{ matrix.image }}:ci-${{ github.sha }}
      - name: Generate SPDX SBOM from the built image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ matrix.image }}:ci-${{ github.sha }}
          format: spdx-json
          output-file: ${{ matrix.component }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Upload ${{ matrix.component }} SPDX SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.component }}-spdx
          path: ${{ matrix.component }}.spdx.json
          if-no-files-found: error
          retention-days: 14
